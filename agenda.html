<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda | FocaAgora 🦭</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <style>
    :root {
      --primary-color: #0d6efd;
      --accent-color: #6610f2;
    }
    body { font-family: 'Inter', sans-serif; }
    .navbar { background: linear-gradient(135deg, var(--primary-color), var(--accent-color)); }
    .card { border-radius: 15px; transition: transform 0.2s; }
    .btn-primary { border-radius: 8px; padding: 10px 20px; font-weight: 600; }
    .task-item { border-left: 5px solid var(--primary-color) !important; margin-bottom: 10px; border-radius: 10px !important; }
    .footer-custom { background: #1a1a1a; }
  </style>
</head>

<body class="bg-light d-flex flex-column min-vh-100">

  <nav class="navbar navbar-expand-md navbar-dark shadow">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="paginainicial.html">
        <img src="./pomodoro_files/focalogo.png" width="35" alt="Logo" class="bg-white rounded-circle p-1">
        FocaAgora
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto gap-2">
          <li class="nav-item"><a class="nav-link px-3" href="sobrenos.html">Sobre nós</a></li>
          <li class="nav-item"><a class="nav-link px-3" href="pomodoro.html">Pomodoro</a></li>
          <li class="nav-item"><a class="nav-link px-3" href="index.html">Início</a></li>
          <li class="nav-item"><a class="nav-link active fw-bold px-3" href="questionario.html">Questionário</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container my-5 flex-grow-1">

    <section class="text-center mb-5">
      <h2 class="display-6 fw-bold text-dark">Agenda de Tarefas 🗓️</h2>
      <p class="lead text-secondary">Sua rotina organizada em um só lugar.</p>
    </section>

    <div class="card shadow-sm border-0 mb-5">
      <div class="card-body p-4">
        <h5 class="card-title mb-4 fw-bold text-primary text-uppercase" style="font-size: 0.9rem; letter-spacing: 1px;">Nova Tarefa</h5>
        <form id="formTarefa" class="row g-3">
          <div class="col-md-5">
            <div class="form-floating">
              <input type="text" id="titulo" class="form-control" placeholder="Título" required>
              <label for="titulo">O que precisa ser feito?</label>
            </div>
          </div>
          <div class="col-md-3">
            <div class="form-floating">
              <input type="date" id="data" class="form-control" required>
              <label for="data">Data</label>
            </div>
          </div>
          <div class="col-md-2">
            <div class="form-floating">
              <select id="periodo" class="form-select" required>
                <option value="" selected disabled>Escolha...</option>
                <option value="Manhã">☀️ Manhã</option>
                <option value="Tarde">🌤️ Tarde</option>
                <option value="Noite">🌙 Noite</option>
              </select>
              <label for="periodo">Período</label>
            </div>
          </div>
          <div class="col-md-2 d-grid">
            <button type="submit" class="btn btn-primary shadow-sm h-100">
              <i class="bi bi-plus-lg me-2"></i>Adicionar
            </button>
          </div>
        </form>
      </div>
    </div>

    <div class="row justify-content-center">
      <div class="col-lg-10">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 class="fw-bold m-0"><i class="bi bi-list-check me-2 text-primary"></i>Suas tarefas</h5>
          <span class="badge bg-primary rounded-pill">3 tarefas hoje</span>
        </div>
        
        <div id="listaTarefas" class="list-group shadow-sm">
          <div class="list-group-item task-item d-flex justify-content-between align-items-center p-3 shadow-sm border-0">
            <div>
              <h6 class="mb-0 fw-bold text-dark">Estudar Cálculo II</h6>
              <small class="text-muted"><i class="bi bi-calendar-event me-1"></i> 25/10/2023 • ☀️ Manhã</small>
            </div>
            <div class="btn-group shadow-sm">
              <button class="btn btn-outline-success btn-sm"><i class="bi bi-check2"></i></button>
              <button class="btn btn-outline-danger btn-sm"><i class="bi bi-trash"></i></button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="text-center mt-5">
      <div id="agendamento-google" class="d-inline-block p-2 rounded-pill bg-white shadow-sm border"></div>
    </div>

  </main>

  <footer class="footer-custom text-white text-center py-4 mt-auto">
    <div class="container">
      <p class="mb-1">🦭 <strong>FocaAgora</strong> — Foco é dizer não às distrações.</p>
      <small class="text-secondary">© 2024 Todos os direitos reservados.</small>
    </div>
  </footer>

  <link href="https://calendar.google.com/calendar/scheduling-button-script.css" rel="stylesheet">
  <script src="https://calendar.google.com/calendar/scheduling-button-script.js" async></script>
  <script>
    (function () {
      var target = document.getElementById("agendamento-google");
      window.addEventListener("load", function () {
        calendar.schedulingButton.load({
          url: "https://calendar.google.com/calendar/appointments/schedules/AcZssZ2MhNUx_ZeC8c_gI1nqwiQ074uazwY_y6J6SFp0Sf0Q_2edfWmMgVzdS8KG_OZwjRN4F99g4Xyx?gv=true",
          color: "#0d6efd",
          label: "Agendar um compromisso",
          target,
        });
      });
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
