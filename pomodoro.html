<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro da Foca 🦭</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-md navbar-dark bg-primary shadow-sm">
  <div class="container">

    <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="paginainicial.html">
      <img src="./pomodoro_files/focalogo.png" width="40" alt="Logo">
      FocaAgora
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="sobrenos.html">Sobre nós</a></li>
        <li class="nav-item"><a class="nav-link" href="agenda.html">Agenda</a></li>
        <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
        <li class="nav-item"><a class="nav-link" href="questionario.html">Questionário</a></li>
      </ul>
    </div>

  </div>
</nav>

<!-- CONTEÚDO -->
<main class="container my-5 flex-grow-1 text-center">

  <h2 class="fw-bold mb-4">Pomodoro da Foca 🦭</h2>

  <!-- BOTÕES DE MODO -->
  <div class="btn-group mb-4 flex-wrap" role="group">
    <button id="pomodoroBtn" class="btn btn-primary active">POMODORO</button>
    <button id="shortBtn" class="btn btn-outline-primary">PAUSA CURTA</button>
    <button id="longBtn" class="btn btn-outline-primary">PAUSA LONGA</button>
  </div>

  <!-- MASCOTE + PROGRESS -->
  <div class="position-relative mx-auto mb-4" style="max-width: 420px;">

    <svg id="progress-ring" viewBox="0 0 500 500" class="w-100">
      <circle cx="250" cy="250" r="245" fill="none" stroke="#e0e0e0" stroke-width="5"/>
      <circle id="progress-bar"
              cx="250" cy="250" r="245"
              fill="none"
              stroke="#0d6efd"
              stroke-width="8"
              stroke-dasharray="1539.38"
              stroke-dashoffset="1539.38"
              transform="rotate(-90 250 250)"/>
    </svg>

    <!-- IMAGENS DA FOCA -->
    <img id="foca-estudando-luz-acesa"
         src="pomodoro_files/focaestudandoluzacessa.jpg"
         class="img-fluid rounded position-absolute top-50 start-50 translate-middle shadow"
         style="max-width:70%;"
         alt="Foca estudando">

    <img id="foca-luz-apagada"
         src="pomodoro_files/focaluzapagada.jpg"
         class="img-fluid rounded position-absolute top-50 start-50 translate-middle shadow d-none"
         style="max-width:70%;"
         alt="Foca descansando">

    <img id="foca-virando-pagina"
         src="pomodoro_files/focapassandopagina.png"
         class="img-fluid rounded position-absolute top-50 start-50 translate-middle shadow d-none"
         style="max-width:70%;"
         alt="Foca virando página">

    <img id="foca-divertindo"
         src="pomodoro_files/focasedivertindo.jpg"
         class="img-fluid rounded position-absolute top-50 start-50 translate-middle shadow d-none"
         style="max-width:70%;"
         alt="Foca se divertindo">
  </div>

  <!-- TIMER -->
  <div class="d-flex justify-content-center align-items-center gap-3 mb-4">

    <button id="removeMinute" class="btn btn-outline-secondary" title="Remover 1 minuto">−</button>

    <div id="timer" class="display-4 fw-bold bg-white px-4 py-2 rounded shadow-sm">
      25:00
    </div>

    <button id="addMinute" class="btn btn-outline-secondary" title="Adicionar 1 minuto">+</button>

  </div>

  <!-- CONTROLES -->
  <div class="d-flex justify-content-center gap-3 mb-4">
    <button id="resetBtn" class="btn btn-outline-danger" title="Resetar">🔄</button>
    <button id="startBtn" class="btn btn-success" title="Iniciar">▶️</button>
    <button id="pauseBtn" class="btn btn-warning" title="Pausar">⏸️</button>
  </div>

</main>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center py-3 mt-auto">
  🦭 <strong>Pomodoro da Foca</strong> — Desenvolvido por
  <span class="fw-semibold">Pablo, Rômulo, Matheus e Pedro</span> 💙 <br>
  <em>Foco hoje, sucesso amanhã.</em>
</footer>

<!-- JS -->
<script src="js/pomodoro.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
