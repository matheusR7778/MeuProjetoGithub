<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro | FocaAgora 🦭</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #0d6efd, #6610f2);
    }
    body { font-family: 'Inter', sans-serif; }
    
    /* Navbar Identidade */
    .navbar { background: var(--primary-gradient); }

    /* Estilização do Timer */
    .timer-display {
      font-size: 5rem;
      font-weight: 800;
      letter-spacing: -2px;
      color: #212529;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 10px 40px;
      display: inline-block;
    }

    /* Anel de Progresso */
    #progress-ring {
      filter: drop-shadow(0 0 10px rgba(13, 110, 253, 0.2));
    }

    /* Botões de Modo Estilizados */
    .btn-mode-group {
      background: #e9ecef;
      border-radius: 50px;
      padding: 5px;
    }
    .btn-mode {
      border-radius: 40px !important;
      border: none !important;
      font-weight: 600;
      padding: 8px 25px;
      transition: all 0.3s ease;
    }
    .btn-mode.active {
      background: white !important;
      color: #0d6efd !important;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    /* Controles Principais */
    .control-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      transition: transform 0.2s;
    }
    .control-btn:hover { transform: scale(1.1); }
    
    .btn-start { background: var(--primary-gradient); color: white; border: none; }
    
    .foca-container {
      position: relative;
      background: white;
      border-radius: 50%;
      padding: 20px;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
    }

    .footer-custom { background: #1a1a1a; }
  </style>
</head>

<body class="bg-light d-flex flex-column min-vh-100">

  <nav class="navbar navbar-expand-md navbar-dark shadow-sm">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2 fw-bold" href="paginainicial.html">
        <img src="./pomodoro_files/focalogo.png" width="35" alt="Logo" class="bg-white rounded-circle p-1">
        FocaAgora
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link px-3" href="sobrenos.html">Sobre nós</a></li>
          <li class="nav-item"><a class="nav-link px-3" href="agenda.html">Agenda</a></li>
          <li class="nav-item"><a class="nav-link px-3" href="index.html">Início</a></li>
          <li class="nav-item"><a class="nav-link px-3" href="questionario.html">Questionário</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container my-auto py-5 text-center">

    <div class="mb-4">
      <h2 class="fw-bold text-dark">Hora de Focar! 🦭</h2>
    </div>

    <div class="d-inline-flex btn-mode-group mb-5 shadow-sm">
      <button id="pomodoroBtn" class="btn btn-mode active">Pomodoro</button>
      <button id="shortBtn" class="btn btn-mode">Pausa Curta</button>
      <button id="longBtn" class="btn btn-mode">Pausa Longa</button>
    </div>

    

    <div class="position-relative mx-auto mb-5 foca-container" style="max-width: 400px;">

      <svg id="progress-ring" viewBox="0 0 500 500" class="w-100">
        <circle cx="250" cy="250" r="235" fill="none" stroke="#f0f0f0" stroke-width="15"/>
        <circle id="progress-bar"
                cx="250" cy="250" r="235"
                fill="none"
                stroke="#0d6efd"
                stroke-width="15"
                stroke-linecap="round"
                stroke-dasharray="1476.5"
                stroke-dashoffset="1476.5"
                transform="rotate(-90 250 250)"
                style="transition: stroke-dashoffset 0.3s ease;"/>
      </svg>

      <img id="foca-estudando-luz-acesa"
           src="pomodoro_files/focaestudandoluzacessa.jpg"
           class="img-fluid rounded-circle position-absolute top-50 start-50 translate-middle shadow-lg"
           style="max-width:65%; aspect-ratio: 1/1; object-fit: cover;"
           alt="Foca estudando">

      <img id="foca-luz-apagada" src="pomodoro_files/focaluzapagada.jpg" class="img-fluid rounded-circle position-absolute top-50 start-50 translate-middle shadow-lg d-none" style="max-width:65%; aspect-ratio: 1/1; object-fit: cover;">
      <img id="foca-virando-pagina" src="pomodoro_files/focapassandopagina.png" class="img-fluid rounded-circle position-absolute top-50 start-50 translate-middle shadow-lg d-none" style="max-width:65%; aspect-ratio: 1/1; object-fit: cover;">
      <img id="foca-divertindo" src="pomodoro_files/focasedivertindo.jpg" class="img-fluid rounded-circle position-absolute top-50 start-50 translate-middle shadow-lg d-none" style="max-width:65%; aspect-ratio: 1/1; object-fit: cover;">
    </div>

    <div class="d-flex justify-content-center align-items-center gap-4 mb-5">
      <button id="removeMinute" class="btn btn-outline-secondary rounded-circle shadow-sm" style="width: 45px; height: 45px;">
        <i class="bi bi-dash-lg"></i>
      </button>

      <div id="timer" class="timer-display shadow">
        25:00
      </div>

      <button id="addMinute" class="btn btn-outline-secondary rounded-circle shadow-sm" style="width: 45px; height: 45px;">
        <i class="bi bi-plus-lg"></i>
      </button>
    </div>

    <div class="d-flex justify-content-center gap-4">
      <button id="resetBtn" class="btn btn-light shadow-sm control-btn text-danger" title="Resetar">
        <i class="bi bi-arrow-counterclockwise"></i>
      </button>
      
      <button id="startBtn" class="btn btn-start shadow control-btn" title="Iniciar">
        <i class="bi bi-play-fill"></i>
      </button>
      
      <button id="pauseBtn" class="btn btn-light shadow-sm control-btn text-warning" title="Pausar">
        <i class="bi bi-pause-fill"></i>
      </button>
    </div>

  </main>

  <footer class="footer-custom text-white text-center py-4 mt-auto">
    <div class="container">
      <p class="mb-1 small text-secondary">🦭 <strong>Pomodoro da Foca</strong> — Foco hoje, sucesso amanhã.</p>
      <p class="mb-0 small opacity-50">Pablo, Rômulo, Matheus e Pedro 💙</p>
    </div>
  </footer>

  <script src="js/pomodoro.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
